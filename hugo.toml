baseURL = "https://junhjang.github.io/"
languageCode = "en-us"
title = "Junhyuk Jang"
theme = "PaperMod"
enableRobotsTXT = true
enableEmoji = true
enableGitInfo = true     # use git commit time as each post's lastmod

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true   # allow raw HTML/SVG/JS embeds inside markdown
  # Math: hand math delimiters to KaTeX untouched (no markdown mangling).
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [['$$', '$$'], ['\[', '\]']]
      inline = [['$', '$'], ['\(', '\)']]

[pagination]
  pagerSize = 8

[params]
  defaultTheme = "auto"
  images = ["og-image.png"]   # site-wide default Open Graph card (1200x630)
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowPostNavLinks = true   # prev/next post links at the bottom
  ShowLastMod = true        # display "Updated: ..." when lastmod differs from date
  comments = true           # render the comments partial on posts

  # giscus: GitHub Discussions-backed comments
  # IDs come from gh GraphQL on this repo (Discussions enabled, "General" category).
  [params.giscus]
    repo = "junhjang/junhjang.github.io"
    repoId = "R_kgDOSi5NMg"
    category = "General"
    categoryId = "DIC_kwDOSi5NMs4C9vFf"
    mapping = "pathname"
    inputPosition = "bottom"
    theme = "preferred_color_scheme"
    lang = "en"
  math = true            # enable KaTeX site-wide (see extend_head.html)
  mainSections = ["posts"]

  # Home = the post list itself (no splash page). Name + icons sit at the top,
  # posts right below. Leave Content empty for a clean, minimal header.
  [params.homeInfoParams]
    Title = "Junhyuk Jang"
    Content = ""

  # Social links — shown as icons on the home page.
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/junhjang"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/junhjang/"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10
[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20
